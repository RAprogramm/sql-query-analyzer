name: PR Size Check

on:
  workflow_call:
    inputs:
      rust_changed:
        required: true
        type: string

jobs:
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && inputs.rust_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: RAprogramm/rust-prod-diff-checker@2f7f2953eb242aeadc77fddda4302a7b4757ab7d # v2.0.1
        with:
          max-lines: 200
          format: comment
          post-comment: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
