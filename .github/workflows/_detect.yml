name: Detect Changes

on:
  workflow_call:
    outputs:
      rust:
        description: "Whether Rust files changed"
        value: ${{ jobs.changes.outputs.rust }}
      deps:
        description: "Whether dependency files changed"
        value: ${{ jobs.changes.outputs.deps }}
      reuse:
        description: "Whether REUSE-related files changed"
        value: ${{ jobs.changes.outputs.reuse }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      deps: ${{ steps.filter.outputs.deps }}
      reuse: ${{ steps.filter.outputs.reuse }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            rust:
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.rustfmt.toml'
            deps:
              - 'Cargo.toml'
              - 'Cargo.lock'
            reuse:
              - 'LICENSES/**'
              - '.reuse/**'
              - '**/*.rs'
              - '**/*.toml'
              - '**/*.yml'
              - '**/*.md'
      - name: Debug outputs
        run: |
          echo "rust=${STEPS_FILTER_OUTPUTS_RUST}"
          echo "deps=${STEPS_FILTER_OUTPUTS_DEPS}"
          echo "reuse=${STEPS_FILTER_OUTPUTS_REUSE}"
        env:
          STEPS_FILTER_OUTPUTS_RUST: ${{ steps.filter.outputs.rust }}
          STEPS_FILTER_OUTPUTS_DEPS: ${{ steps.filter.outputs.deps }}
          STEPS_FILTER_OUTPUTS_REUSE: ${{ steps.filter.outputs.reuse }}
